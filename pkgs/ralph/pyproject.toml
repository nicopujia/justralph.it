[project]
name = "ralph"
version = "0.1.0"
description = "Autonomous coding agent loop."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "bd",
    "psutil>=7.2.2",
]

[project.scripts]
ralph = "ralph.main:main"

[tool.setuptools]
packages = ["ralph", "ralph.core", "ralph.cmds", "ralph.utils", "ralph.templates"]

[tool.setuptools.package-dir]
ralph = "."
"ralph.core" = "core"
"ralph.cmds" = "cmds"
"ralph.utils" = "utils"
"ralph.templates" = "templates"

[tool.setuptools.package-data]
ralph = ["opencode.jsonc", "PROMPT.xml"]
"ralph.templates" = ["hooks.py"]

[tool.uv.sources]
bd = { workspace = true }
