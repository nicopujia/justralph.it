# justralph.it Ralphy Configuration

project:
  name: "justralph.it"
  language: "Python"
  framework: "FastAPI"
  description: "AI-powered project builder: chatbot extracts requirements, autonomous agent builds code"

commands:
  test: "uv run pytest"
  lint: "uv run ruff check ."
  build: "cd client && bun run build"

rules:
  - "Use uv for all Python tasks"
  - "Use bun for frontend tasks"
  - "Follow conventional commits"
  - "Keep code concise, document the non-obvious"
  - "Do not use em-dashes in docs"

boundaries:
  never_touch:
    - ".ralphy/"
    - "*.lock"
    - ".env"
