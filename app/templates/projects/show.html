{% extends "base.html" %}

{% block title %}{{ project["name"] }} — just-ralph-it{% endblock %}

{% block content %}
<div style="display: flex; gap: 1rem; height: calc(100vh - 4rem);">
    <!-- Chat Panel -->
    <div id="chat-panel" style="width: 40%; border: 1px solid #333; border-radius: 4px; padding: 1rem; overflow-y: auto;">
        <h2 style="color: #4fc3f7; margin-top: 0;">Chat</h2>
        <p style="color: #888;">Ralphy chat will appear here.</p>
    </div>

    <!-- Tab Panel -->
    <div id="tab-panel" style="width: 60%; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 4px; overflow: hidden;">
        <!-- Tab Buttons -->
        <div style="display: flex; border-bottom: 1px solid #333;">
            <button onclick="switchTab('spec')" id="tab-btn-spec" style="flex: 1; padding: 0.5rem; background: #2a2a2a; color: #4fc3f7; border: none; cursor: pointer; font-family: monospace; border-bottom: 2px solid #4fc3f7;">Spec</button>
            <button onclick="switchTab('issues')" id="tab-btn-issues" style="flex: 1; padding: 0.5rem; background: #2a2a2a; color: #888; border: none; cursor: pointer; font-family: monospace; border-bottom: 2px solid transparent;">Issues</button>
            <button onclick="switchTab('terminal')" id="tab-btn-terminal" style="flex: 1; padding: 0.5rem; background: #2a2a2a; color: #888; border: none; cursor: pointer; font-family: monospace; border-bottom: 2px solid transparent;">Terminal</button>
        </div>

        <!-- Tab Content -->
        <div style="flex: 1; overflow-y: auto; padding: 1rem;">
            <div id="spec-content">
                <p style="color: #888;">AGENTS.md content will appear here.</p>
            </div>
            <div id="issues-content" style="display: none;">
                <p style="color: #888;">Beads issues will appear here.</p>
            </div>
            <div id="terminal-content" style="display: none; font-family: monospace; background: #111; padding: 1rem; border-radius: 4px; color: #0f0; min-height: 200px;">
                <p>Ralph stdout will appear here.</p>
            </div>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    var tabs = ['spec', 'issues', 'terminal'];
    for (var i = 0; i < tabs.length; i++) {
        var content = document.getElementById(tabs[i] + '-content');
        var btn = document.getElementById('tab-btn-' + tabs[i]);
        if (tabs[i] === tab) {
            content.style.display = '';
            btn.style.color = '#4fc3f7';
            btn.style.borderBottom = '2px solid #4fc3f7';
        } else {
            content.style.display = 'none';
            btn.style.color = '#888';
            btn.style.borderBottom = '2px solid transparent';
        }
    }
}
</script>
{% endblock %}
