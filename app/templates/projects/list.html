{% extends "base.html" %}

{% block title %}Projects{% endblock %}

{% block content %}
<h1>Projects</h1>
<a href="/projects/new" style="display:inline-block;margin-bottom:1rem;">New Project</a>
{% for project in projects %}
<div style="margin-bottom:0.5rem;">
    <a href="/projects/{{ project['slug'] }}">{{ project['name'] }}</a>
</div>
{% endfor %}
{% endblock %}
